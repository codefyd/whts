<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تفاصيل الحملة - منصة واتساب</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>

  <div class="main-content">

    <header class="page-header">
      <button class="hamburger-btn btn-ghost" id="hamburger-btn">☰</button>
      <a href="campaigns.html" class="btn btn-ghost btn-sm">← العودة للحملات</a>
      <h1 id="page-title">تفاصيل الحملة</h1>
      <button class="btn btn-secondary btn-sm" id="btn-refresh">🔄 تحديث</button>
    </header>

    <main class="page-body">

      <!-- Loading -->
      <div id="loading-state" class="loading-overlay">
        <div class="loading-spinner"></div>
        <span>جارٍ التحميل...</span>
      </div>

      <!-- Content (hidden until loaded) -->
      <div id="page-content" class="hidden">

        <!-- Campaign Info + Stats -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;" class="settings-grid">

          <div class="card">
            <div class="card-header">
              <h2>📋 معلومات الحملة</h2>
              <div id="campaign-status-badge"></div>
            </div>
            <div class="card-body">
              <table style="width:100%;font-size:14px;border-collapse:collapse;">
                <tr>
                  <td style="padding:7px 0;color:var(--text-secondary);width:40%;">اسم الحملة</td>
                  <td id="info-name" style="font-weight:600;"></td>
                </tr>
                <tr>
                  <td style="padding:7px 0;color:var(--text-secondary);">القالب</td>
                  <td id="info-template" dir="ltr" style="font-family:monospace;"></td>
                </tr>
                <tr>
                  <td style="padding:7px 0;color:var(--text-secondary);">اللغة</td>
                  <td id="info-lang"></td>
                </tr>
                <tr>
                  <td style="padding:7px 0;color:var(--text-secondary);">تاريخ الإنشاء</td>
                  <td id="info-created"></td>
                </tr>
                <tr>
                  <td style="padding:7px 0;color:var(--text-secondary);">تاريخ الإطلاق</td>
                  <td id="info-launched"></td>
                </tr>
                <tr>
                  <td style="padding:7px 0;color:var(--text-secondary);">الجمهور</td>
                  <td id="info-audience"></td>
                </tr>
              </table>
            </div>
          </div>

          <div>
            <div class="stats-grid" style="grid-template-columns:1fr 1fr;">
              <div class="stat-card">
                <div class="stat-icon gray">📋</div>
                <div class="stat-info">
                  <div class="stat-value" id="s-queued">0</div>
                  <div class="stat-label">في الانتظار</div>
                </div>
              </div>
              <div class="stat-card">
                <div class="stat-icon blue">📤</div>
                <div class="stat-info">
                  <div class="stat-value" id="s-sent">0</div>
                  <div class="stat-label">مُرسل</div>
                </div>
              </div>
              <div class="stat-card">
                <div class="stat-icon green">✅</div>
                <div class="stat-info">
                  <div class="stat-value" id="s-delivered">0</div>
                  <div class="stat-label">مُسلَّم</div>
                </div>
              </div>
              <div class="stat-card">
                <div class="stat-icon purple">👁️</div>
                <div class="stat-info">
                  <div class="stat-value" id="s-read">0</div>
                  <div class="stat-label">مقروء</div>
                </div>
              </div>
            </div>
            <div class="stat-card" style="margin-top:0;">
              <div class="stat-icon red">❌</div>
              <div class="stat-info">
                <div class="stat-value" id="s-failed">0</div>
                <div class="stat-label">فشل</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Progress Bar -->
        <div class="card" style="margin-bottom:24px;">
          <div class="card-body" style="padding:16px 20px;">
            <div class="flex gap-12" style="margin-bottom:8px;align-items:center;">
              <span style="font-size:14px;font-weight:600;">نسبة التسليم</span>
              <span id="delivery-pct" class="badge badge-blue">0%</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" id="delivery-bar" style="width:0%;"></div>
            </div>
          </div>
        </div>

        <!-- Recipients Table -->
        <div class="card">
          <div class="card-header">
            <h2>👥 قائمة المستلمين</h2>
            <span id="recipients-count" class="badge badge-gray">0</span>
          </div>
          <div class="table-wrap">
            <table class="table">
              <thead>
                <tr>
                  <th>الاسم</th>
                  <th>الجوال</th>
                  <th>الحالة</th>
                  <th>وقت الإرسال</th>
                  <th>وقت التسليم</th>
                  <th>وقت القراءة</th>
                  <th>الخطأ</th>
                </tr>
              </thead>
              <tbody id="recipients-tbody"></tbody>
            </table>
          </div>
        </div>

      </div>
    </main>
  </div>
</div>

<script src="assets/js/supabase-client.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/sidebar.js"></script>
<script src="assets/js/campaign-view.js"></script>
</body>
</html>
